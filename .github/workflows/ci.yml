name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Backend lint (ruff + bandit) — fast, no services needed
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff==0.4.7 bandit==1.7.9

      - name: ruff — style and import checks
        run: ruff check backend/app

      - name: bandit — security scan (medium+ severity)
        # -ll = report medium and high severity only
        # -x  = exclude test helpers that intentionally use weak crypto
        run: bandit -r backend/app -ll -x backend/app/core/security.py

  # ---------------------------------------------------------------------------
  # Backend tests with coverage
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov fakeredis

      - name: Run tests with coverage
        env:
          # SQLite in-memory — no real Postgres needed in CI
          DATABASE_URL:        sqlite+aiosqlite:///:memory:
          REDIS_URL:           redis://localhost:6379/0
          SECRET_KEY:          ci-test-secret-key-not-for-production
          ALGORITHM:           HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS:   "7"
          OPENAI_API_KEY:      test
          OPENAI_CHAT_MODEL:   gpt-4o
          OPENAI_EMBEDDING_MODEL: text-embedding-3-small
          PINECONE_API_KEY:    test
          PINECONE_ENVIRONMENT: us-east-1
          PINECONE_INDEX_NAME: test-index
          UPLOAD_DIR:          /tmp/docqa-uploads
          MAX_FILE_SIZE_MB:    "50"
          CORS_ORIGINS:        http://localhost:3000
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

      - name: Coverage summary comment on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: Backend Coverage Report

  # ---------------------------------------------------------------------------
  # Frontend tests (vitest)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

  # ---------------------------------------------------------------------------
  # Docker build gate — only runs when both test jobs pass
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: docqa-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: docqa-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
