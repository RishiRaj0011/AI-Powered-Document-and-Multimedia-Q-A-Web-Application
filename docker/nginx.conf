# This file must be kept in sync with frontend/nginx.conf
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (documents, audio, video)
    client_max_body_size 100m;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        application/json
        application/javascript
        application/x-javascript
        text/javascript
        image/svg+xml
        application/xml;

    # -------------------------------------------------------------------------
    # Health check endpoint (used by Docker HEALTHCHECK and load balancers)
    # -------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # API proxy → FastAPI backend
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming support — disable buffering for /stream endpoints
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # -------------------------------------------------------------------------
    # Static asset caching — hashed filenames from Vite build
    # -------------------------------------------------------------------------
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # React SPA — all other routes serve index.html
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
